android.useAndroidX=true
android.enableJetifier=false
kotlin.code.style=official

# Single JVM strategy: Kotlin compiles in-process so we only have ONE JVM
# D8 also runs in the Gradle worker (no isolation), so this heap covers everything
org.gradle.jvmargs=-Xmx768m -XX:MaxMetaspaceSize=256m -XX:+UseG1GC
org.gradle.workers.max=1
org.gradle.daemon=false

# Force Kotlin to compile in-process (no separate kotlin daemon spawned)
kotlin.compiler.execution.strategy=in-process
