name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build Release APK
        run: gradle assembleRelease
        working-directory: DeckMaster

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: DeckMaster-release-apk
          path: DeckMaster/app/build/outputs/apk/release/*.apk
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0
          name: DeckMaster v1.0
          body: |
            DeckMaster Android app — first release.
            Built automatically by GitHub Actions.
          files: DeckMaster/app/build/outputs/apk/release/*.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
