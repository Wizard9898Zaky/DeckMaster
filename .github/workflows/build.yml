name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Build Release APK
        run: gradle assembleRelease
        working-directory: DeckMaster

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: DeckMaster-release-apk
          path: DeckMaster/app/build/outputs/apk/release/*.apk
          retention-days: 90
